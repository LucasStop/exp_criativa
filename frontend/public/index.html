<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cakeria - Confeitaria</title>
  
  <!-- Favicon -->
  <link rel="icon" href="/assets/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="shortcut icon" type="image/png" href="/assets/favicon-32x32.png">
  
  <!-- CSS -->
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/components/components.css">
</head>
<body>
  <header-component></header-component>

  <main id="content">
    <section class="hero">
      <div class="container">
        <div class="hero-content">
          <h2>Doces que encantam. Sabores que surpreendem.</h2>
          <p>Os melhores bolos e doces artesanais para todas as ocasiões especiais</p>
          <div class="hero-buttons">
            <button class="btn btn-primary" id="ver-produtos">Ver Produtos</button>
            <button class="btn btn-outline">Fazer Pedido</button>
          </div>
        </div>
      </div>
    </section>

    <section class="featured">
      <div class="container">
        <h2 class="section-title">Produtos Destacados</h2>
        <div class="featured-products" id="produtos-container">
          <!-- Produtos serão carregados aqui via JavaScript -->
          <p class="loading">Carregando produtos...</p>
        </div>
      </div>
    </section>

    <section class="categories">
      <div class="container">
        <h2 class="section-title">Nossas Categorias</h2>
        <div class="category-grid" id="categorias-container">
          <!-- Categorias serão carregadas aqui via JavaScript -->
          <p class="loading">Carregando categorias...</p>
        </div>
      </div>
    </section>
  </main>

  <footer-component></footer-component>

  <!-- Carregar componentes primeiro -->
  <script src="/components/Header.js"></script>
  <script src="/components/Footer.js"></script>
  <!-- Script para carregar a configuração da API antes do script principal -->
  <script>
    fetch('/config')
      .then(response => response.json())
      .then(config => {
        window.API_URL = config.apiUrl;
        console.log('API configurada:', window.API_URL);
        
        // Carregar o script principal após obter a configuração
        const script = document.createElement('script');
        script.src = '/js/script.js';
        document.body.appendChild(script);
      })
      .catch(error => {
        console.error('Erro ao carregar configuração:', error);
        // Fallback para URL local
        window.API_URL = 'http://localhost:3001/api';
        
        const script = document.createElement('script');
        script.src = '/js/script.js';
        document.body.appendChild(script);
      });
  </script>
</body>
</html>
